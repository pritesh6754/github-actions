name: Depploy Flask App

on:
    # workflow_dispatch:
    push:
        branches: [main]

jobs:
    
    deploy:
        env:
            DOCKERHUB_USER: ${{ vars.DOCKERHUB_USER }}

        runs-on: self-hosted

        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Set up Docker Compose (optional, usually pre-installed on ubuntu-latest runners)
              uses: docker/setup-compose-action@v2 

            - name: Deploy with docker compose
              run: docker compose up -d --build
            
