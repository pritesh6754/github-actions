name: Depploy Flask App

on:
    workflow_dispatch:

jobs:
    
    deploy:
        env:
            DOCKERHUB_USER: ${{ vars.DOCKERHUB_USER }}

        runs-on: self-hosted

        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Setup docker compose
              run: docker/setup-compose-action@v2  

            - name: Deploy with docker compose
              run: docker compose up -d --build
            
