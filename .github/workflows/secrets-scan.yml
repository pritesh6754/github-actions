# API Keys, sesitive-data, credentials
# GitLeaks
name: Secrets Scan

on:
    workflow_call:

jobs:
    secrets-scan:
        runs-on: ubuntu-latest
        steps:
            - name: checkout code
              uses: actions/checkout@v4
              with:
                fetch-depth: 0 # Fetch all history for accurate scanning

            - name: Run GitLeaks scanner
              uses: gitleaks/gitleaks-action@v2
              env:
                GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }} # github actions manages it
                GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }} # if you have a license key for gitleaks, add it to your repository secrets
